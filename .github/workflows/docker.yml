name: CI/CD Docker GHCR

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/yajanuha597/examen-devops:1.0.0 .
          docker build -t ghcr.io/yajanuha597/examen-devops:latest .

      - name: Push Docker image
        run: |
          docker push ghcr.io/yajanuha597/examen-devops:1.0.0
          docker push ghcr.io/yajanuha597/examen-devops:latest